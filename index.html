<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FeelingAlive</title>
  <meta name="theme-color" content="#c0622a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:       #2a1f14;
      --ink-mid:   #6b5744;
      --ink-light: #a89482;
      --paper:     #faf7f2;
      --paper-2:   #f2ede4;
      --accent:    #c0622a;
      --rule:      #e0d5c8;
      --serif:     'Lora', Georgia, serif;
      --sans:      'DM Sans', system-ui, sans-serif;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--rule);
      padding: 0 1.25rem;
      background: var(--paper);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      gap: 1rem;
    }
    .site-name {
      font-family: var(--serif);
      font-size: 1.3rem;
      color: var(--ink);
      text-decoration: none;
      white-space: nowrap;
      cursor: pointer;
    }
    .site-name span { color: var(--accent); }

    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 340px;
    }
    .search-wrap svg {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--ink-light);
      pointer-events: none;
    }
    #search {
      width: 100%;
      padding: 7px 12px 7px 36px;
      border: 1px solid var(--rule);
      border-radius: 24px;
      background: var(--paper-2);
      font-family: var(--sans);
      font-size: 0.875rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--ink-light); }

    /* ── HERO ── */
    .hero {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 1rem;
      border-bottom: 1px solid var(--rule);
    }
    .hero-label {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 0.4rem;
    }
    .hero h1 {
      font-family: var(--serif);
      font-size: clamp(1.4rem, 4vw, 2rem);
      line-height: 1.25;
      color: var(--ink);
    }

    /* ── BLOG LIST ── */
    #list-view {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1.25rem 4rem;
    }

    .posts-meta {
      font-size: 0.75rem;
      color: var(--ink-light);
      margin: 1rem 0 0.25rem;
    }

    .post-grid { display: grid; gap: 0; }

    .post-card {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 1rem;
      padding: 1.1rem 0;
      border-bottom: 1px solid var(--rule);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    .post-card:hover .post-title { color: var(--accent); }

    .post-tag {
      display: inline-block;
      font-size: 0.67rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 0.25rem;
    }
    .post-title {
      font-family: var(--serif);
      font-size: 1.1rem;
      line-height: 1.35;
      color: var(--ink);
      transition: color 0.2s;
      margin-bottom: 0.3rem;
    }
    .post-excerpt {
      font-size: 0.84rem;
      color: var(--ink-mid);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .post-card-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.5rem;
      padding-top: 0.2rem;
    }

    .post-date {
      font-size: 0.73rem;
      color: var(--ink-light);
      white-space: nowrap;
    }

    /* share button on card */
    .share-btn-card {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      color: var(--ink-light);
      border: 1px solid var(--rule);
      border-radius: 20px;
      padding: 3px 9px;
      background: transparent;
      cursor: pointer;
      font-family: var(--sans);
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
    .share-btn-card:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .no-results {
      text-align: center;
      padding: 3rem 0;
      color: var(--ink-light);
      font-family: var(--serif);
      font-style: italic;
      font-size: 1rem;
    }

    /* ── BLOG POST VIEW ── */
    #post-view {
      display: none;
      max-width: 660px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 5rem;
    }

    .post-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      color: var(--ink-mid);
      cursor: pointer;
      border: none;
      background: none;
      font-family: var(--sans);
      padding: 0;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--accent); }

    /* share button on post */
    .share-btn-post {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--ink-mid);
      border: 1px solid var(--rule);
      border-radius: 20px;
      padding: 5px 14px;
      background: transparent;
      cursor: pointer;
      font-family: var(--sans);
      transition: all 0.2s;
    }
    .share-btn-post:hover {
      color: var(--accent);
      border-color: var(--accent);
    }
    .share-btn-post.copied {
      color: #3a7d44;
      border-color: #3a7d44;
    }

    /* toast */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--ink);
      color: var(--paper);
      font-size: 0.8rem;
      font-family: var(--sans);
      padding: 8px 18px;
      border-radius: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 9999;
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Markdown styles */
    #post-body { line-height: 1.85; color: var(--ink); }
    #post-body h1, #post-body h2, #post-body h3 {
      font-family: var(--serif);
      color: var(--ink);
      margin: 2rem 0 0.75rem;
    }
    #post-body h1 { font-size: 1.6rem; }
    #post-body h2 { font-size: 1.3rem; }
    #post-body h3 { font-size: 1.1rem; }
    #post-body p { margin-bottom: 1.25rem; font-size: 1.05rem; }
    #post-body a { color: var(--accent); text-underline-offset: 3px; }
    #post-body blockquote {
      border-left: 3px solid var(--accent);
      margin: 1.5rem 0;
      padding: 0.5rem 0 0.5rem 1.25rem;
      color: var(--ink-mid);
      font-family: var(--serif);
      font-style: italic;
      font-size: 1.05rem;
    }
    #post-body ul, #post-body ol {
      margin: 0 0 1.25rem 1.5rem;
      font-size: 1.05rem;
    }
    #post-body li { margin-bottom: 0.4rem; }
    #post-body code {
      background: var(--paper-2);
      border: 1px solid var(--rule);
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 0.88em;
    }
    #post-body pre {
      background: var(--paper-2);
      border: 1px solid var(--rule);
      border-radius: 8px;
      padding: 1.25rem;
      overflow-x: auto;
      margin-bottom: 1.5rem;
    }
    #post-body pre code { background: none; border: none; padding: 0; font-size: 0.9rem; }
    #post-body img { max-width: 100%; border-radius: 6px; margin: 1rem 0; }
    #post-body hr { border: none; border-top: 1px solid var(--rule); margin: 2rem 0; }

    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--ink-light);
      font-family: var(--serif);
      font-style: italic;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--rule);
      text-align: center;
      padding: 1.25rem;
      font-size: 0.75rem;
      color: var(--ink-light);
    }

    @media (max-width: 480px) {
      .post-card { grid-template-columns: 1fr; }
      .post-card-right { flex-direction: row; align-items: center; }
      .header-inner { height: auto; padding: 0.6rem 0; flex-wrap: wrap; }
      .search-wrap { max-width: 100%; order: 3; flex-basis: 100%; margin-bottom: 0.4rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <a class="site-name" onclick="showList()">Feeling<span>Alive</span></a>
      <div class="search-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="search" placeholder="Search posts…" oninput="filterPosts()" aria-label="Search posts" />
      </div>
    </div>
  </header>

  <!-- LIST VIEW -->
  <div id="list-view">
    <div class="hero">
      <p class="hero-label">Personal Journal</p>
      <h1>Thoughts &amp; feelings.</h1>
    </div>

    <div>
      <p class="posts-meta" id="posts-meta"></p>
      <div class="post-grid" id="post-grid">
        <div class="loading">Loading posts…</div>
      </div>
      <p class="no-results" id="no-results" style="display:none;">No posts found.</p>
    </div>
  </div>

  <!-- POST VIEW -->
  <div id="post-view">
    <div class="post-nav">
      <button class="back-btn" onclick="showList()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        All posts
      </button>
      <button class="share-btn-post" id="share-btn" onclick="shareCurrentPost()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        Share
      </button>
    </div>
    <div id="post-body"></div>
  </div>

  <div id="toast">Link copied!</div>

  <footer>
    <p style="font-family: cursive;">Written by, <i>Rupesh</i></p>
  </footer>

  <script>

    let allPosts = [];
    let currentPost = null;

    /* ── derive a stable ID from the filename ── */
    function fileToId(file) {
      return encodeURIComponent(file);
    }
    function idToFile(id) {
      return decodeURIComponent(id);
    }

    /* ── URL helpers ── */
    function getPostIdFromUrl() {
      return new URLSearchParams(window.location.search).get('post');
    }
    function pushPostUrl(post) {
      const id = fileToId(post.file);
      const url = '?post=' + id;
      history.pushState({ postId: id }, post.title || 'Post', url);
    }
    function pushListUrl() {
      history.pushState({}, 'FeelingAlive', window.location.pathname);
    }

    /* ── init ── */
    async function init() {
      try {
        const res = await fetch('blogs.json');
        const data = await res.json();
        allPosts = data.posts || data;
        renderList(allPosts);

        /* deep-link support: load post if ?post= is in URL */
        const id = getPostIdFromUrl();
        if (id) {
          const file = idToFile(id);
          const post = allPosts.find(p => p.file === file);
          if (post) {
            openPost(post, false); /* false = don't push history again */
          }
        }
      } catch (e) {
        document.getElementById('post-grid').innerHTML =
          '<p class="loading">Could not load posts. Make sure blogs.json is present.</p>';
      }
    }

    /* ── handle browser back/forward ── */
    window.addEventListener('popstate', (e) => {
      const id = getPostIdFromUrl();
      if (id) {
        const file = idToFile(id);
        const post = allPosts.find(p => p.file === file);
        if (post) { openPost(post, false); return; }
      }
      showList(false);
    });

    /* ── render list ── */
    function renderList(posts) {
      const grid = document.getElementById('post-grid');
      const meta = document.getElementById('posts-meta');
      const none = document.getElementById('no-results');

      if (posts.length === 0) {
        grid.innerHTML = '';
        none.style.display = 'block';
        meta.textContent = '';
        return;
      }
      none.style.display = 'none';
      meta.textContent = posts.length === 1 ? '1 post' : `${posts.length} posts`;

      grid.innerHTML = posts.map(post => `
        <div class="post-card" onclick="openPost(${JSON.stringify(post).replace(/"/g, '&quot;')})" role="article" tabindex="0" onkeydown="if(event.key==='Enter')openPost(${JSON.stringify(post).replace(/"/g, '&quot;')})">
          <div>
            ${post.tag ? `<span class="post-tag">${escHtml(post.tag)}</span>` : ''}
            <p class="post-title">${escHtml(post.title)}</p>
            ${post.excerpt ? `<p class="post-excerpt">${escHtml(post.excerpt)}</p>` : ''}
          </div>

        </div>
      `).join('');
    }

    function filterPosts() {
      const q = document.getElementById('search').value.trim().toLowerCase();
      if (!q) { renderList(allPosts); return; }
      const filtered = allPosts.filter(p =>
        (p.title || '').toLowerCase().includes(q) ||
        (p.excerpt || '').toLowerCase().includes(q) ||
        (p.tag || '').toLowerCase().includes(q)
      );
      renderList(filtered);
    }

    /* ── open post ── */
    async function openPost(post, pushHistory = true) {
      currentPost = post;
      document.getElementById('list-view').style.display = 'none';
      const pv = document.getElementById('post-view');
      pv.style.display = 'block';
      window.scrollTo(0, 0);

      /* reset share button */
      const btn = document.getElementById('share-btn');
      btn.classList.remove('copied');
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> Share`;

      document.getElementById('post-body').innerHTML = '<div class="loading">Loading…</div>';
      document.title = (post.title || 'Post') + ' — FeelingAlive';

      if (pushHistory) pushPostUrl(post);

      try {
        const res = await fetch(post.file);
        if (!res.ok) throw new Error('Not found');
        const md = await res.text();
        document.getElementById('post-body').innerHTML = marked.parse(md);
      } catch (e) {
        document.getElementById('post-body').innerHTML =
          '<p style="color:var(--ink-mid)">Could not load this post.</p>';
      }
    }

    /* ── show list ── */
    function showList(pushHistory = true) {
      currentPost = null;
      document.getElementById('post-view').style.display = 'none';
      document.getElementById('list-view').style.display = 'block';
      document.title = 'FeelingAlive';
      window.scrollTo(0, 0);
      if (pushHistory) pushListUrl();
    }

    /* ── build shareable URL for a post ── */
    function buildPostUrl(post) {
      const base = window.location.origin + window.location.pathname;
      return base + '?post=' + fileToId(post.file);
    }

    /* ── share from post view ── */
    function shareCurrentPost() {
      if (!currentPost) return;
      const url = buildPostUrl(currentPost);

      if (navigator.share) {
        navigator.share({ title: currentPost.title || 'FeelingAlive', url }).catch(() => {});
        return;
      }

      copyToClipboard(url, () => {
        const btn = document.getElementById('share-btn');
        btn.classList.add('copied');
        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> Share`;
        }, 2500);
      });
    }

    /* ── share from list card ── */
    function copyPostLink(post) {
      const url = buildPostUrl(post);
      copyToClipboard(url, () => showToast('Link copied!'));
    }

    /* ── clipboard helper ── */
    function copyToClipboard(text, onSuccess) {
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(onSuccess).catch(() => fallbackCopy(text, onSuccess));
      } else {
        fallbackCopy(text, onSuccess);
      }
    }
    function fallbackCopy(text, onSuccess) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); onSuccess(); } catch {}
      document.body.removeChild(ta);
    }

    /* ── toast ── */
    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
    }

    /* ── utils ── */
    function formatDate(str) {
      try {
        return new Date(str).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      } catch { return str; }
    }
    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    init();
  </script>
</body>
</html>
